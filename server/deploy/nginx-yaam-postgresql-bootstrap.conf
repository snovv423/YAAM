# HTTP-only bootstrap for the first Let's Encrypt certificate.
# Replace ${DOMAIN} before enabling. This file is temporary: after certbot
# succeeds, replace it with nginx-yaam-postgresql.conf and reload Nginx.

upstream yaam_postgresql_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://yaam_postgresql_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
