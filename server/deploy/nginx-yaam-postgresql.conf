# Nginx reverse-proxy шаблон для YAAM PostgreSQL backend (server.postgresql.js).
#
# Production Switch — Stage 9. ЭТО ШАБЛОН, НЕ ПРИМЕНЁННЫЙ НИ К ОДНОМУ
# РЕАЛЬНОМУ Nginx/VPS — подготовлен без доступа к реальной инфраструктуре.
# Замените ${DOMAIN} (например, api-pg.yaam.su — НЕ основной api.yaam.su,
# который зарезервирован для будущего Stage 10) и пути к сертификатам на
# реальные перед использованием. См. server/docs/postgresql-deployment-
# runbook.md за полным контекстом установки/проверки.
#
# ВАЖНО про Trust Proxy (Stage 9, задача 6): строка
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# ниже — это ПОЛОВИНА контракта. Вторая половина — TRUST_PROXY=loopback в
# .env приложения (server/.env.postgresql.example) — БЕЗ неё Express
# приложения игнорирует этот заголовок (безопасный дефолт). Обе половины
# обязательны вместе для корректной работы YOOKASSA_WEBHOOK_ENFORCE_IP_ALLOWLIST
# (Stage 8) — см. server/test/postgresql/trustProxyStage9.test.js за живым
# доказательством этой логики на уровне приложения (без реального Nginx).
#
# WebSocket: YAAM НЕ использует WebSocket нигде в текущей архитектуре (ни
# клиент, ни backend) — соответствующие Upgrade/Connection-заголовки НЕ
# добавлены намеренно, не как забытая недоделка. Если в будущем появится
# realtime-канал (например, SSE для статуса заказа) — добавить отдельно,
# тогда же и протестировать.

upstream yaam_postgresql_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Let's Encrypt HTTP-01 challenge (certbot --webroot) — держим ДО
    # редиректа на HTTPS, иначе продление сертификата будет ломаться.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # Пути — типичные для certbot --nginx/--webroot на Debian/Ubuntu;
    # проверить и поправить под реальную установку (см. deploy/setup-ssl.sh).
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Stage 9 staging starts with a five-minute HSTS window. Increase only in
    # the separately approved production switch after HTTPS is proven stable.
    add_header Strict-Transport-Security "max-age=300" always;

    # Дополнительные security-заголовки на уровне Nginx — приложение
    # (services/postgresql/app.js) уже добавляет X-Content-Type-Options/
    # X-Frame-Options/Referrer-Policy само (Stage 7) — здесь НЕ дублируем
    # то же самое дважды, только то, что уместнее на уровне прокси.
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # gzip — компактные JSON-ответы API, разумные типы/порог.
    gzip on;
    gzip_types application/json;
    gzip_min_length 512;
    gzip_proxied any;

    # Body size — совпадает (не меньше) с express.raw({limit:'64kb'}) на
    # webhook-маршруте (Stage 8, routes/postgresql/api.js) плюс запас для
    # обычных JSON-запросов (заказы с составом корзины). Не завышать
    # бесконтрольно — это тоже defense-in-depth против аномально больших
    # тел до того, как они вообще дойдут до Node.
    client_max_body_size 256k;

    # Таймауты — реальные сетевые вызовы к ЮKassa (createPayment/refund)
    # имеют собственные внутренние таймауты 10с (PAYMENT_*_TIMEOUT_MS,
    # Stage 1/8) — proxy_read_timeout должен быть строго БОЛЬШЕ них с
    # запасом, иначе Nginx оборвёт соединение раньше, чем backend успеет
    # честно ответить об ошибке провайдера.
    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    # Буферизация — стандартная (on) корректна для этого API: ответы не
    # потоковые/не SSE, обычные завершённые JSON-ответы.
    proxy_buffering on;
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;

    location / {
        proxy_pass http://yaam_postgresql_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Trust Proxy контракт (см. header-комментарий выше) —
        # ОБЯЗАТЕЛЬНЫЕ три заголовка для корректной работы req.ip/req.protocol
        # в Express при TRUST_PROXY=loopback.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health-эндпоинты — тот же upstream, отдельная location НЕ нужна
    # (readiness-гейт Stage 7 сам решает, что доступно до готовности) —
    # оставлено для симметрии/явности, если понадобится отдельная политика
    # логирования/кеширования для мониторинга в будущем.
    location = /health/live {
        proxy_pass http://yaam_postgresql_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
}
